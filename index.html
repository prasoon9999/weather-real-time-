<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>local weather · no api</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0b1f2e, #1d3b4e);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .weather-panel {
            max-width: 480px;
            width: 100%;
            background: rgba(18, 34, 48, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 42px;
            padding: 28px 24px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.06);
            color: white;
            transition: all 0.2s ease;
        }

        h1 {
            font-weight: 400;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .badge {
            background: rgba(100, 200, 230, 0.2);
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-weight: 400;
            color: #b0ecff;
            border: 1px solid #3f9cbb;
            margin-left: 8px;
        }

        .sub {
            color: #b6d0db;
            font-size: 0.95rem;
            margin-bottom: 28px;
            padding-left: 10px;
            border-left: 3px solid #4fc3e0;
        }

        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 180px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9bb7c9;
            font-style: normal;
            font-weight: 300;
            font-size: 1.2rem;
        }

        #cityInput {
            width: 100%;
            padding: 15px 16px 15px 48px;
            border-radius: 60px;
            border: none;
            background: #1f3c4d;
            color: white;
            font-size: 1rem;
            outline: 2px solid transparent;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
        }

        #cityInput:focus {
            outline: 2px solid #63c3e5;
            background: #1f4557;
        }

        #cityInput::placeholder {
            color: #8daebb;
            font-weight: 300;
        }

        button {
            background: #2d4d62;
            border: 1px solid #48758c;
            border-radius: 60px;
            padding: 0 22px;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            height: 52px;
            white-space: nowrap;
        }

        button:hover {
            background: #3e637b;
            border-color: #6aa3c0;
            transform: scale(1.02);
        }

        .surprise-btn {
            background: #3e566b;
            border-color: #5b7f99;
        }

        .weather-card {
            background: #102c3b;
            border-radius: 36px;
            padding: 22px 20px;
            box-shadow: inset 0 4px 12px #00000040, 0 6px 12px #00000030;
            border: 1px solid #2f5568;
            margin-top: 10px;
        }

        .city-head {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 2rem;
            font-weight: 300;
            border-bottom: 1px dashed #3e6a80;
            padding-bottom: 14px;
            margin-bottom: 18px;
        }

        .city-name {
            font-weight: 600;
            font-size: 2rem;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 8px black;
            word-break: break-word;
        }

        .temp-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .temp-main {
            font-size: 5rem;
            font-weight: 200;
            line-height: 1;
            text-shadow: 0 8px 16px #00000080;
        }

        .temp-main small {
            font-size: 2rem;
            font-weight: 300;
            opacity: 0.75;
        }

        .weather-icon {
            font-size: 4rem;
            filter: drop-shadow(0 10px 14px black);
            background: #1c3f52;
            padding: 8px 22px;
            border-radius: 70px;
            border: 1px solid #40758f;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 16px;
        }

        .metric {
            background: #1a3e4f;
            border-radius: 26px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid #2d627b;
            box-shadow: inset 0 2px 5px #00000040;
        }

        .metric-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 300;
            line-height: 1.2;
        }

        .metric-value small {
            font-size: 1rem;
            opacity: 0.7;
        }

        .footnote {
            margin-top: 22px;
            font-size: 0.8rem;
            text-align: center;
            opacity: 0.5;
            border-top: 1px dashed #2f5568;
            padding-top: 16px;
        }

        .mock-note {
            background: #2b5a70;
            border-radius: 60px;
            padding: 8px 16px;
            font-size: 0.85rem;
            text-align: center;
            color: #d5f0ff;
            border: 1px solid #89c2d9;
            margin-bottom: 16px;
        }

        .error-msg {
            background: #b43b3b80;
            border-radius: 40px;
            padding: 12px;
            text-align: center;
            color: #ffd6d6;
            border: 1px solid #ff8a8a;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="weather-panel">
        <h1>
            ⛅ breeze 
            <span class="badge">NO API • SIMULATED</span>
        </h1>
        <div class="sub">real‑time look, zero external calls</div>

        <div class="search-row">
            <div class="input-group">
                <i>🔍</i>
                <input type="text" id="cityInput" placeholder="city (e.g. Paris, Tokyo)" value="New York">
            </div>
            <button id="searchBtn">check</button>
            <button id="surpriseBtn" class="surprise-btn" title="random city">🎲</button>
        </div>

        <!-- mock data notice -->
        <div class="mock-note">
            ⚡ all weather data is locally generated — no real api used
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <!-- main weather display -->
        <div class="weather-card" id="weatherDisplay">
            <div class="city-head">
                <span>📍</span>
                <span class="city-name" id="cityDisplay">New York</span>
            </div>
            <div class="temp-section">
                <div class="temp-main" id="tempDisplay">23<span>°C</span></div>
                <div class="weather-icon" id="iconDisplay">☀️</div>
            </div>
            <div class="detail-grid">
                <div class="metric">
                    <div class="metric-label">feels like</div>
                    <div class="metric-value" id="feelsLike">21<small>°C</small></div>
                </div>
                <div class="metric">
                    <div class="metric-label">humidity</div>
                    <div class="metric-value" id="humidity">62<small>%</small></div>
                </div>
                <div class="metric">
                    <div class="metric-label">wind</div>
                    <div class="metric-value" id="wind">14<small>km/h</small></div>
                </div>
                <div class="metric">
                    <div class="metric-label">condition</div>
                    <div class="metric-value" id="condition">clear</div>
                </div>
            </div>
        </div>

        <div class="footnote">
            🌱 purely frontend simulation · every search gives fresh fake data
        </div>
    </div>

    <script>
        (function() {
            // ----- DOM elements -----
            const cityInput = document.getElementById('cityInput');
            const searchBtn = document.getElementById('searchBtn');
            const surpriseBtn = document.getElementById('surpriseBtn');
            const cityDisplay = document.getElementById('cityDisplay');
            const tempDisplay = document.getElementById('tempDisplay');
            const iconDisplay = document.getElementById('iconDisplay');
            const feelsLike = document.getElementById('feelsLike');
            const humidity = document.getElementById('humidity');
            const wind = document.getElementById('wind');
            const condition = document.getElementById('condition');
            const errorMsg = document.getElementById('errorMsg');

            // ----- helper: hide error, show weather -----
            function clearError() {
                errorMsg.style.display = 'none';
                errorMsg.innerText = '';
            }

            function showError(text) {
                errorMsg.innerText = text;
                errorMsg.style.display = 'block';
            }

            // ----- generate random weather data for a given city name (string) -----
            function generateMockWeather(city) {
                // random seed based on city name + current minute to vary results
                const now = new Date();
                const seed = (city.length * 7 + now.getHours() * 3 + now.getMinutes()) % 100;

                // temperature between -5 and 38 with some variation
                const baseTemp = 10 + (seed * 0.5) % 28; // 10..38
                const temp = Math.round(baseTemp * 10) / 10;

                // feels like: slightly adjust
                const feels = temp + (Math.random() * 4 - 2).toFixed(1);
                
                // humidity 30% - 90%
                const hum = Math.round(30 + (seed * 0.8) % 60);
                
                // wind 0 - 35 km/h
                const windSpd = Math.round((seed % 35) + Math.random() * 5);

                // weather condition & icon based on temperature & randomness
                const conditions = [
                    { emoji: '☀️', text: 'sunny' },
                    { emoji: '⛅', text: 'partly cloudy' },
                    { emoji: '☁️', text: 'cloudy' },
                    { emoji: '🌧️', text: 'rain' },
                    { emoji: '⛈️', text: 'storm' },
                    { emoji: '🌨️', text: 'snow' },
                    { emoji: '🌫️', text: 'fog' },
                    { emoji: '💨', text: 'windy' }
                ];

                // pick an index based on city name and minute
                let condIndex = Math.floor((seed + city.length) % conditions.length);
                // if temperature below 2, maybe snow bias
                if (temp < 2 && condIndex < 4) condIndex = 5; // snow
                else if (temp > 30 && condIndex > 3) condIndex = 0; // sunny

                const chosen = conditions[condIndex];

                return {
                    city: city.trim() || 'Unknown',
                    temperature: temp,
                    feelsLike: Math.round((feels + Number.EPSILON) * 10) / 10,
                    humidity: hum,
                    wind: windSpd,
                    emoji: chosen.emoji,
                    conditionText: chosen.text,
                };
            }

            // ----- update UI with mock data object -----
            function updateUI(weather) {
                cityDisplay.innerText = weather.city;
                tempDisplay.innerHTML = Math.round(weather.temperature) + '<span>°C</span>';
                feelsLike.innerHTML = Math.round(weather.feelsLike) + '<small>°C</small>';
                humidity.innerHTML = weather.humidity + '<small>%</small>';
                wind.innerHTML = weather.wind + '<small>km/h</small>';
                iconDisplay.innerText = weather.emoji;
                condition.innerText = weather.conditionText;
            }

            // ----- main action: generate mock for input city -----
            function showWeatherForCity(cityName) {
                if (!cityName || cityName.trim() === '') {
                    showError('please enter a city name');
                    return false;
                }
                clearError();
                const mock = generateMockWeather(cityName.trim());
                updateUI(mock);
                return true;
            }

            // ----- surprise me: pick a random city from a list -----
            function surpriseCity() {
                const cities = [
                    'Tokyo', 'Paris', 'Sydney', 'Cairo', 'Moscow', 
                    'Lima', 'Bangkok', 'Nairobi', 'Reykjavik', 'Mumbai',
                    'New York', 'Cape Town', 'London', 'Rio', 'Oslo',
                    'Dubai', 'Seoul', 'Mexico City', 'Jakarta', 'Casablanca'
                ];
                const random = cities[Math.floor(Math.random() * cities.length)];
                cityInput.value = random;
                showWeatherForCity(random);
            }

            // ----- event listeners -----
            searchBtn.addEventListener('click', () => {
                showWeatherForCity(cityInput.value);
            });

            cityInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    showWeatherForCity(cityInput.value);
                }
            });

            surpriseBtn.addEventListener('click', surpriseCity);

            // ----- initial load (New York) -----
            // ensure default city is shown
            window.addEventListener('load', () => {
                // generate for "New York" (already in input)
                showWeatherForCity('New York');
            });
        })();
    </script>
</body>
</html>
