<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>breeze · real weather</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0b1f2e, #1d3b4e);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .weather-panel {
            max-width: 480px;
            width: 100%;
            background: rgba(18, 34, 48, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 42px;
            padding: 28px 24px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.06);
            color: white;
            transition: all 0.2s ease;
        }

        h1 {
            font-weight: 400;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .badge {
            background: rgba(100, 200, 230, 0.2);
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.8rem;
            font-weight: 400;
            color: #b0ecff;
            border: 1px solid #3f9cbb;
            margin-left: 8px;
        }

        .sub {
            color: #b6d0db;
            font-size: 0.95rem;
            margin-bottom: 28px;
            padding-left: 10px;
            border-left: 3px solid #4fc3e0;
        }

        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 180px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9bb7c9;
            font-style: normal;
            font-weight: 300;
            font-size: 1.2rem;
        }

        #cityInput {
            width: 100%;
            padding: 15px 16px 15px 48px;
            border-radius: 60px;
            border: none;
            background: #1f3c4d;
            color: white;
            font-size: 1rem;
            outline: 2px solid transparent;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
        }

        #cityInput:focus {
            outline: 2px solid #63c3e5;
            background: #1f4557;
        }

        #cityInput::placeholder {
            color: #8daebb;
            font-weight: 300;
        }

        button {
            background: #2d4d62;
            border: 1px solid #48758c;
            border-radius: 60px;
            padding: 0 22px;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            height: 52px;
            white-space: nowrap;
        }

        button:hover {
            background: #3e637b;
            border-color: #6aa3c0;
            transform: scale(1.02);
        }

        .surprise-btn {
            background: #3e566b;
            border-color: #5b7f99;
        }

        .weather-card {
            background: #102c3b;
            border-radius: 36px;
            padding: 22px 20px;
            box-shadow: inset 0 4px 12px #00000040, 0 6px 12px #00000030;
            border: 1px solid #2f5568;
            margin-top: 10px;
        }

        .city-head {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 2rem;
            font-weight: 300;
            border-bottom: 1px dashed #3e6a80;
            padding-bottom: 14px;
            margin-bottom: 18px;
        }

        .city-name {
            font-weight: 600;
            font-size: 2rem;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 8px black;
            word-break: break-word;
        }

        .temp-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .temp-main {
            font-size: 5rem;
            font-weight: 200;
            line-height: 1;
            text-shadow: 0 8px 16px #00000080;
        }

        .temp-main small {
            font-size: 2rem;
            font-weight: 300;
            opacity: 0.75;
        }

        .weather-icon {
            font-size: 4rem;
            filter: drop-shadow(0 10px 14px black);
            background: #1c3f52;
            padding: 8px 22px;
            border-radius: 70px;
            border: 1px solid #40758f;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 16px;
        }

        .metric {
            background: #1a3e4f;
            border-radius: 26px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid #2d627b;
            box-shadow: inset 0 2px 5px #00000040;
        }

        .metric-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 300;
            line-height: 1.2;
        }

        .metric-value small {
            font-size: 1rem;
            opacity: 0.7;
        }

        .footnote {
            margin-top: 22px;
            font-size: 0.8rem;
            text-align: center;
            opacity: 0.5;
            border-top: 1px dashed #2f5568;
            padding-top: 16px;
        }

        .error-msg {
            background: #b43b3b80;
            border-radius: 40px;
            padding: 12px;
            text-align: center;
            color: #ffd6d6;
            border: 1px solid #ff8a8a;
            margin-bottom: 16px;
            display: none;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="weather-panel">
        <h1>
            ⛅ breeze 
            <span class="badge">OPENWEATHERMAP</span>
        </h1>
        <div class="sub">real‑time weather from around the globe</div>

        <div class="search-row">
            <div class="input-group">
                <i>🔍</i>
                <input type="text" id="cityInput" placeholder="city (e.g. Paris, Tokyo)" value="London">
            </div>
            <button id="searchBtn">check</button>
            <button id="surpriseBtn" class="surprise-btn" title="random city">🎲</button>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <!-- main weather display -->
        <div class="weather-card" id="weatherDisplay">
            <div class="city-head">
                <span>📍</span>
                <span class="city-name" id="cityDisplay">--</span>
            </div>
            <div class="temp-section">
                <div class="temp-main" id="tempDisplay">--<span>°C</span></div>
                <div class="weather-icon" id="iconDisplay">☀️</div>
            </div>
            <div class="detail-grid">
                <div class="metric">
                    <div class="metric-label">feels like</div>
                    <div class="metric-value" id="feelsLike">--<small>°C</small></div>
                </div>
                <div class="metric">
                    <div class="metric-label">humidity</div>
                    <div class="metric-value" id="humidity">--<small>%</small></div>
                </div>
                <div class="metric">
                    <div class="metric-label">wind</div>
                    <div class="metric-value" id="wind">--<small>km/h</small></div>
                </div>
                <div class="metric">
                    <div class="metric-label">condition</div>
                    <div class="metric-value" id="condition">--</div>
                </div>
            </div>
        </div>

        <div class="footnote">
            🌐 data provided by OpenWeatherMap · your API key is active
        </div>
    </div>

    <script>
        (function() {
            // ---------- CONFIG ----------
            const API_KEY = '452c8fbc8b05c444b7d0858abe1d76a9';  // your key
            const BASE_URL = 'https://api.openweathermap.org/data/2.5/weather';

            // ---------- DOM elements ----------
            const cityInput = document.getElementById('cityInput');
            const searchBtn = document.getElementById('searchBtn');
            const surpriseBtn = document.getElementById('surpriseBtn');
            const cityDisplay = document.getElementById('cityDisplay');
            const tempDisplay = document.getElementById('tempDisplay');
            const iconDisplay = document.getElementById('iconDisplay');
            const feelsLike = document.getElementById('feelsLike');
            const humidity = document.getElementById('humidity');
            const wind = document.getElementById('wind');
            const condition = document.getElementById('condition');
            const errorMsg = document.getElementById('errorMsg');

            // ---------- helper: hide/show error ----------
            function clearError() {
                errorMsg.style.display = 'none';
                errorMsg.innerText = '';
            }

            function showError(text) {
                errorMsg.innerText = text;
                errorMsg.style.display = 'block';
            }

            // ---------- map OpenWeather condition codes to emoji + text ----------
            function mapWeatherCode(iconCode, description) {
                // iconCode examples: '01d' (clear day), '01n' (clear night), '10d' (rain), etc.
                // we'll use the description as fallback, but also map by icon prefix
                const mainIcon = iconCode ? iconCode.substring(0, 2) : '01';
                
                const map = {
                    '01': { emoji: '☀️', text: 'clear sky' },      // clear
                    '02': { emoji: '🌤️', text: 'few clouds' },    // few clouds
                    '03': { emoji: '☁️', text: 'scattered clouds' },
                    '04': { emoji: '☁️', text: 'broken clouds' },
                    '09': { emoji: '🌧️', text: 'shower rain' },
                    '10': { emoji: '🌦️', text: 'rain' },
                    '11': { emoji: '⛈️', text: 'thunderstorm' },
                    '13': { emoji: '🌨️', text: 'snow' },
                    '50': { emoji: '🌫️', text: 'mist' }
                };
                
                const fallback = map[mainIcon] || { emoji: '🌈', text: description || 'unknown' };
                return {
                    emoji: fallback.emoji,
                    text: description || fallback.text
                };
            }

            // ---------- update UI with real API data ----------
            function updateUI(data) {
                // data is the parsed JSON from OpenWeather
                const name = data.name + (data.sys.country ? `, ${data.sys.country}` : '');
                cityDisplay.innerText = name;

                const temp = Math.round(data.main.temp);
                tempDisplay.innerHTML = temp + '<span>°C</span>';

                const feels = Math.round(data.main.feels_like);
                feelsLike.innerHTML = feels + '<small>°C</small>';

                humidity.innerHTML = data.main.humidity + '<small>%</small>';

                // wind speed (convert from m/s to km/h: 1 m/s = 3.6 km/h)
                const windKmh = Math.round(data.wind.speed * 3.6);
                wind.innerHTML = windKmh + '<small>km/h</small>';

                // weather icon & description
                const weather = data.weather[0];
                const { emoji, text } = mapWeatherCode(weather.icon, weather.description);
                iconDisplay.innerText = emoji;
                condition.innerText = text;
            }

            // ---------- fetch real weather for a city ----------
            async function fetchWeather(city) {
                if (!city.trim()) {
                    showError('Please enter a city name');
                    return;
                }
                clearError();

                // optional: simple loading state (disable button, show spinner)
                searchBtn.disabled = true;
                searchBtn.innerHTML = '<span class="loader"></span> loading';
                
                try {
                    const url = `${BASE_URL}?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`;
                    const response = await fetch(url);
                    
                    if (!response.ok) {
                        if (response.status === 404) {
                            throw new Error(`City "${city}" not found`);
                        } else if (response.status === 401) {
                            throw new Error('Invalid API key');
                        } else {
                            throw new Error(`HTTP error ${response.status}`);
                        }
                    }
                    
                    const data = await response.json();
                    updateUI(data);
                } catch (err) {
                    showError(err.message);
                } finally {
                    // restore button
                    searchBtn.disabled = false;
                    searchBtn.innerHTML = 'check';
                }
            }

            // ---------- surprise: random city from list ----------
            function surpriseCity() {
                const cities = [
                    'Tokyo', 'Paris', 'Sydney', 'Cairo', 'Moscow', 
                    'Lima', 'Bangkok', 'Nairobi', 'Reykjavik', 'Mumbai',
                    'New York', 'Cape Town', 'London', 'Rio', 'Oslo',
                    'Dubai', 'Seoul', 'Mexico City', 'Jakarta', 'Casablanca'
                ];
                const random = cities[Math.floor(Math.random() * cities.length)];
                cityInput.value = random;
                fetchWeather(random);
            }

            // ---------- event listeners ----------
            searchBtn.addEventListener('click', () => {
                fetchWeather(cityInput.value);
            });

            cityInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    fetchWeather(cityInput.value);
                }
            });

            surpriseBtn.addEventListener('click', surpriseCity);

            // ---------- initial load (London) ----------
            window.addEventListener('load', () => {
                fetchWeather('London');
            });
        })();
    </script>
</body>
</html>
